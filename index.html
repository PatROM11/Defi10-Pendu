<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu du Pendu</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 10px; }
        #game-container { max-width: 400px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        svg { width: 100%; max-width: 200px; height: auto; margin-bottom: 10px; }
        .draw { fill: none; stroke: #333; stroke-width: 4; stroke-dasharray: 200; stroke-dashoffset: 200; transition: stroke-dashoffset 0.6s ease-in-out; }
        .draw.visible { stroke-dashoffset: 0; }
        #word-display { font-size: 24px; font-weight: bold; letter-spacing: 6px; margin: 10px 0; color: #2c3e50; }
        
        /* Clavier virtuel */
        #keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .key { padding: 10px 5px; background: #ddd; border-radius: 5px; cursor: pointer; font-weight: bold; user-select: none; }
        .key:active { background: #bbb; }
        
        #mot-input { width: 90%; padding: 10px; margin-top: 10px; border: 2px solid #ddd; border-radius: 8px; text-align: center; }
        #message { font-weight: bold; font-size: 20px; margin-top: 10px; height: 25px; }
        #replay-btn { display: none; margin-top: 10px; padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <svg viewBox="0 0 200 200">
        <line x1="20" y1="190" x2="180" y2="190" stroke="black" stroke-width="4" />
        <line x1="50" y1="190" x2="50" y2="20" stroke="black" stroke-width="4" />
        <line x1="50" y1="20" x2="140" y2="20" stroke="black" stroke-width="4" />
        <line x1="140" y1="20" x2="140" y2="40" stroke="black" stroke-width="4" />
        <circle id="head" cx="140" cy="60" r="20" class="draw" />
        <line id="body" x1="140" y1="80" x2="140" y2="130" class="draw" />
        <line id="arm1" x1="140" y1="90" x2="110" y2="120" class="draw" />
        <line id="arm2" x1="140" y1="90" x2="170" y2="120" class="draw" />
        <line id="hand1" x1="110" y1="120" x2="100" y2="110" class="draw" />
        <line id="hand2" x1="170" y1="120" x2="180" y2="110" class="draw" />
        <line id="leg1" x1="140" y1="130" x2="110" y2="170" class="draw" />
        <line id="leg2" x1="140" y1="130" x2="170" y2="170" class="draw" />
        <line id="foot1" x1="110" y1="170" x2="100" y2="175" class="draw" />
        <line id="foot2" x1="170" y1="170" x2="180" y2="175" class="draw" />
    </svg>

    <div id="word-display">_ _ _ _ _</div>
    <div id="keyboard"></div>
    <input type="text" id="mot-input" placeholder="Tenter le mot complet ici">
    <div id="message"></div>
    <button id="replay-btn" onclick="location.reload()">Rejouer</button>
</div>

<script>
    const words = ["AVION", "BATEAU", "CARTABLE", "DINOSAURE", "ECOLE", "FRANCAIS", "HEROS", "IMAGE", "JARDIN"];
    let selectedWord = words[Math.floor(Math.random() * words.length)];
    let guessedWord = Array(selectedWord.length).fill("_");
    let mistakes = 0;
    const parts = ["head", "body", "arm1", "arm2", "hand1", "hand2", "leg1", "leg2", "foot1", "foot2"];

    const kb = document.getElementById("keyboard");
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter => {
        const btn = document.createElement("div");
        btn.className = "key";
        btn.innerText = letter;
        btn.onclick = () => handleLetter(letter, btn);
        kb.appendChild(btn);
    });

    function handleLetter(letter, btn) {
        btn.style.visibility = "hidden";
        if (selectedWord.includes(letter)) {
            for (let i = 0; i < selectedWord.length; i++) {
                if (selectedWord[i] === letter) guessedWord[i] = letter;
            }
            document.getElementById("word-display").innerText = guessedWord.join(" ");
            if (!guessedWord.includes("_")) endGame("Bravo !");
        } else {
            document.getElementById(parts[mistakes]).classList.add("visible");
            mistakes++;
            if (mistakes >= parts.length) endGame("Perdu !");
        }
    }

    document.getElementById("mot-input").addEventListener("keypress", function(e) {
        if (e.key === "Enter" && this.value) {
            if (this.value.toUpperCase() === selectedWord) endGame("SUPER BRAVO !");
            else endGame("Perdu !");
        }
    });

    function endGame(msg) {
        document.getElementById("message").innerText = msg;
        document.getElementById("word-display").innerText = selectedWord;
        document.getElementById("keyboard").style.display = "none";
        document.getElementById("mot-input").style.display = "none";
        document.getElementById("replay-btn").style.display = "inline-block";
        if (msg === "Perdu !") parts.forEach(p => document.getElementById(p).classList.add("visible"));
    }
</script>
</body>
</html>
